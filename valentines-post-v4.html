<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valentine's Day Post - Rescued Book Art V4</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,500&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #333;
        }

        .post-container {
            width: 1080px;
            height: 1080px;
            background: #8b7355;
            position: relative;
            overflow: hidden;
        }

        /* Textured background */
        .background-texture {
            position: absolute;
            width: 100%;
            height: 100%;
            background:
                linear-gradient(135deg, rgba(180, 155, 130, 0.3) 0%, transparent 50%),
                linear-gradient(225deg, rgba(139, 115, 85, 0.4) 0%, transparent 50%),
                radial-gradient(ellipse at 30% 20%, rgba(205, 185, 160, 0.5) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(160, 140, 115, 0.4) 0%, transparent 50%);
            background-color: #c9b8a0;
        }

        .paper-texture {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0.06;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%' height='100%' filter='url(%23noise)'/%3E%3C/svg%3E");
        }

        /* Top banner - single line, no wrap */
        .top-banner {
            position: absolute;
            top: 28px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(180deg, #6b5a4a 0%, #5c4a3d 50%, #4a3d32 100%);
            color: #f5ebe0;
            padding: 14px 50px;
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 5px;
            text-transform: uppercase;
            white-space: nowrap;
            z-index: 10;
            box-shadow:
                0 6px 20px rgba(0,0,0,0.3),
                inset 0 1px 0 rgba(255,255,255,0.1);
            border-radius: 4px;
        }

        .top-banner::before,
        .top-banner::after {
            content: '♥';
            margin: 0 15px;
            font-size: 20px;
            color: #d4a574;
        }

        /* Main content */
        .content {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100%;
            padding-top: 100px;
            padding-bottom: 75px;
            justify-content: center;
            z-index: 5;
        }

        /* Book frame with shadow and subtle rotation */
        .book-frame-wrapper {
            position: relative;
            margin-bottom: 25px;
            transform: rotate(-1deg);
        }

        .book-frame {
            background: #fffef9;
            padding: 20px;
            box-shadow:
                0 4px 8px rgba(60, 45, 30, 0.12),
                0 15px 50px rgba(60, 45, 30, 0.25),
                inset 0 0 0 1px rgba(139, 115, 85, 0.1);
            border-radius: 6px;
            position: relative;
        }

        /* Soft inner mount */
        .book-mount {
            background: #fff;
            padding: 10px;
            border-radius: 3px;
            box-shadow: inset 0 0 30px rgba(139, 115, 85, 0.06);
        }

        .book-image {
            display: block;
            width: 600px;
            height: auto;
            border-radius: 2px;
        }

        /* Corner accents - subtle decorative corners */
        .corner {
            position: absolute;
            width: 40px;
            height: 40px;
            z-index: 15;
        }

        .corner-tl {
            top: 8px;
            left: 8px;
            border-top: 3px solid rgba(92, 74, 61, 0.25);
            border-left: 3px solid rgba(92, 74, 61, 0.25);
            border-radius: 4px 0 0 0;
        }

        .corner-tr {
            top: 8px;
            right: 8px;
            border-top: 3px solid rgba(92, 74, 61, 0.25);
            border-right: 3px solid rgba(92, 74, 61, 0.25);
            border-radius: 0 4px 0 0;
        }

        .corner-bl {
            bottom: 8px;
            left: 8px;
            border-bottom: 3px solid rgba(92, 74, 61, 0.25);
            border-left: 3px solid rgba(92, 74, 61, 0.25);
            border-radius: 0 0 0 4px;
        }

        .corner-br {
            bottom: 8px;
            right: 8px;
            border-bottom: 3px solid rgba(92, 74, 61, 0.25);
            border-right: 3px solid rgba(92, 74, 61, 0.25);
            border-radius: 0 0 4px 0;
        }

        /* Script text */
        .script-text {
            font-family: 'Great Vibes', cursive;
            font-size: 58px;
            color: #5c4a3d;
            margin-bottom: 8px;
            text-shadow:
                2px 2px 4px rgba(255,255,255,0.5),
                -1px -1px 0 rgba(255,255,255,0.2);
        }

        .sub-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 22px;
            font-style: italic;
            color: #7a6855;
            letter-spacing: 3px;
        }

        /* Bottom bar */
        .bottom-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(180deg, #6b5a4a 0%, #5c4a3d 100%);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
        }

        .tagline {
            font-family: 'Cormorant Garamond', serif;
            font-size: 18px;
            color: #f5ebe0;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .logo {
            height: 45px;
            width: auto;
        }

        /* Side flourishes */
        .flourish {
            position: absolute;
            font-family: serif;
            font-size: 50px;
            color: rgba(92, 74, 61, 0.1);
            z-index: 1;
        }

        .flourish-left {
            left: 30px;
            top: 50%;
            transform: translateY(-50%);
        }

        .flourish-right {
            right: 30px;
            top: 50%;
            transform: translateY(-50%) scaleX(-1);
        }
    </style>
</head>
<body>
    <div class="post-container">
        <div class="background-texture"></div>
        <div class="paper-texture"></div>

        <!-- Side flourishes -->
        <div class="flourish flourish-left">❧</div>
        <div class="flourish flourish-right">❧</div>

        <!-- Top banner -->
        <div class="top-banner">Back in Stock</div>

        <div class="content">
            <!-- Framed book page with corner accents -->
            <div class="book-frame-wrapper">
                <div class="book-frame">
                    <div class="corner corner-tl"></div>
                    <div class="corner corner-tr"></div>
                    <div class="corner corner-bl"></div>
                    <div class="corner corner-br"></div>
                    <div class="book-mount">
                        <img src="Images/social media/Social Media Images/How much I love you/Up to my toes.jpg"
                             alt="I love you all the way up to my toes - Guess How Much I Love You"
                             class="book-image">
                    </div>
                </div>
            </div>

            <!-- Script text -->
            <div class="script-text">Perfect for Valentine's</div>
            <div class="sub-text">a beloved classic</div>
        </div>

        <!-- Bottom bar -->
        <div class="bottom-bar">
            <span class="tagline">A second life for treasured stories</span>
            <img src="Images/RBA Brand/logo small.png"
                 alt="Rescued Book Art"
                 class="logo">
        </div>
    </div>
</body>
</html>
